---

# jenkins variables
project_name: docker-mylar3
external_type: github_commit
release_type: prerelease
release_tag: nightly
ls_branch: nightly
repo_vars:
  - EXT_GIT_BRANCH = 'nightly'
  - EXT_USER = 'MylarComics'
  - EXT_REPO = 'mylar3'
  - BUILD_VERSION_ARG = 'MYLAR3_RELEASE'
  - LS_USER = 'linuxserver'
  - LS_REPO = 'docker-mylar3'
  - CONTAINER_NAME='mylar3'
  - DOCKERHUB_IMAGE = 'linuxserver/mylar3'
  - DEV_DOCKERHUB_IMAGE = 'lsiodev/mylar3'
  - PR_DOCKERHUB_IMAGE = 'lspipepr/mylar3'
  - DIST_IMAGE = 'ubuntu'
  - MULTIARCH='true'
  - CI='true'
  - CI_WEB='true'
  - CI_PORT='8090'
  - CI_SSL='false'
  - CI_DELAY='120'
  - CI_DOCKERENV='TZ=Etc/UTC'
  - CI_AUTH='user:password'
  - CI_WEBPATH=''
